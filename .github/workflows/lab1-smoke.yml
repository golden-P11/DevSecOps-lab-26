name: Lab 1 Juice Shop Smoke Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Verify Juice Shop Health
    runs-on: ubuntu-latest

    steps:
      - name: Start Juice Shop
        run: |
          docker run -d \
            --name juice-shop \
            -p 127.0.0.1:3000:3000 \
            bkimminich/juice-shop:v20.0.0

      - name: Wait for Juice Shop to become ready
        run: |
          for attempt in $(seq 1 30); do
            echo "Health-check attempt: ${attempt}"

            if curl \
              --silent \
              --fail \
              http://127.0.0.1:3000/ > /dev/null; then
              echo "Juice Shop is ready."
              exit 0
            fi

            sleep 2
          done

          echo "Juice Shop did not become healthy within 60 seconds."
          docker logs juice-shop
          exit 1

      - name: Verify homepage HTTP status
        run: |
          HTTP_CODE=$(curl \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            http://127.0.0.1:3000/)

          echo "Homepage HTTP status: ${HTTP_CODE}"

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "Expected HTTP 200 but received ${HTTP_CODE}."
            exit 1
          fi

      - name: Show container status
        if: always()
        run: |
          docker ps -a \
            --filter name=juice-shop \
            --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

      - name: Show logs on failure
        if: failure()
        run: docker logs juice-shop
